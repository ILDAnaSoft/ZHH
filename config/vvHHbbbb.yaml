    event_categorization:
      default: EventCategories.ttHZ
      order: null
      items: [ ttH, ttZ ] # ttHZ
    disabled: false
    reset: false

# feature definition
# controls how data from ROOT input files of each source should be interpreted and
# converted to columnar format. assumes that branches are in regular shape, i.e.
# have same number of rows (and also columns for 2D branches)
features:

  # interpret a branch of a TTree as either 1D or 2D array, supports 1D+2D branches
  # all properties defined here will be readonly in analysis code
  # Arguments:
  # interpret/name: name of output dataset in HDF5 file. data is accessed using this key
  #                 as hdf5file[name] or dataStore[name] in analysis code. see also names
  # interpret/tree: TTree and name
  # interpret/branch: (optional) branch name; name will be used, if not provided
  # interpret/columns: for 2D arrays: must be an integer, specifying how many columns are
  #                    expected to exist they will be saved as <name>.dim<i> with i=0,..,
  #                    <columns>
  #                    for named arrays: must be a list of strings, specifying the names
  #                    of each column (e.g. fCoordinates.fX, ... for a PxPyPzE vector)
  # interpret/auto_increment: if True, this will be filled with np.arange(nrows, [dtype=
  #                           interpret/dtype, defaults to uint32])
  # interpret/names: list of names; can be used to create multiple entries within the
  #                  interpret section with different name. this enforces branch = name
  # interpret/clamp_min or clamp_max: if defined, values of this branch will be clamped
  #                                   within this range
  # interpret/nan_to: if defined, NaN values will be replaced with this. this is done 
  #                   after clamping (if any)
  interpret:
  - { name: id, dtype: uint32, auto_increment: true }
  - { name: event, tree: FinalStates, dtype: uint32 }
  - { name: cross_section, tree: FinalStates, dtype: float }
  - { name: final_state_counts, tree: FinalStates, branch: final_state_counts.second, columns: 17, dtype: uint8 }
  - { name: n_b_from_higgs, tree: FinalStates, dtype: uint8 }
  - { name: pol_code, tree: FinalStates, branch: polarization_code, dtype: uint8 }
  - { name: process, tree: FinalStates, dtype: uint32 }

  # physics quantities
  - { names: [ npfos ], tree: EventObservablesVV, dtype: uint16 }
  - { names: [ nisoleptons, pairedLepType ], tree: EventObservablesVV, dtype: uint8 }
  - { names: [ zhh_mhh,
               bmax1, bmax2, bmax3, bmax4,
               jet1_m, jet2_m, jet3_m, jet4_m,
               ptmiss, thrust, evis, m_invjet,
               costhrust, npfosmin5j,
               yplus, yminus,
               zz_mz1, zz_mz2,
               massWtt4j, massT1tt4j, massT2tt4j,
               massW1tt5j, massW2tt5j, massT1tt5j, massT2tt5j], tree: EventObservablesVV, dtype: float32 }
  
  # renamed/clamped quantities
  - { name: fit4C_mhh, tree: EventObservablesVV, dtype: float32, nan_to: -20., clamp_min: -10. }
  - { name: fit4C_mh1, tree: EventObservablesVV, dtype: float32, nan_to: -20., clamp_min: -10. }
  - { name: fit4C_mh2, tree: EventObservablesVV, dtype: float32, nan_to: -20., clamp_min: -10. }
  - { name: ZHH_FitChi2, tree: KinFitVV_ZHH, branch: FitChi2, dtype: float32 }
  - { name: ZZH_FitChi2, tree: KinFitVV_ZZH, branch: FitChi2, dtype: float32 }
  - { name: ZHH_p1stBeforeFit, tree: KinFitVV_ZHH, branch: p1stBeforeFit, dtype: float32, clamp_min: -999., clamp_max: 999. }
  - { name: ZZH_p1stBeforeFit, tree: KinFitVV_ZZH, branch: p1stBeforeFit, dtype: float32, clamp_min: -999., clamp_max: 999. }
  - { name: ZHH_cosThBeforeFit, tree: KinFitVV_ZHH, branch: cosThBeforeFit, dtype: float32 }
  - { name: ZZH_cosThBeforeFit, tree: KinFitVV_ZZH, branch: cosThBeforeFit, dtype: float32 }

  # MEM
  #- { names: [
  #      lep1_4v/fCoordinates,
  #      lep2_4v/fCoordinates,
  #      jet1_4v/fCoordinates,
  #      jet2_4v/fCoordinates,
  #      jet3_4v/fCoordinates,
  #      jet4_4v/fCoordinates
  #    ], tree: EventObservablesVV, dtype: float32, columns: [ fCoordinates.fX, fCoordinates.fY, fCoordinates.fZ, fCoordinates.fT ] }
  #- { name: jet_matching_kinfit_best, tree: EventObservablesVV, dtype: int8, columns: 4 }
  #- { names: [ jet1_tags, jet2_tags, jet3_tags, jet4_tags ], tree: EventObservablesVV, dtype: float32 }
  
  # TODO: ability to use custom handlers to attach these
  # serialize:
  # - { handler: Serializers.JetMasses, provides: [ jet0_m, jet1_m, jet2_m, jet4_m ] }

# cutflow_table
# defines the event categories and the order with which they should be appear in the
# cutflow table and also which of them are considered to belong to the signal (these
# are appended to the rightmost part of the table).
# items/category: name of the event category (must be part of EventCategories)
# items/label: column label (supports LaTeX)
# items/is_signal: optional, defaults to false; whether or not this category belongs to
#                  the signal
# ignore_categories: for each background category A that includes another category B,
#                    category B must be given here to avoid double counting

cutflow_table:
  items:
    - category: evbbqq
      label: '\boldsymbol{e \nu b b q q}'
    - category: μvbbqq
      label: '\boldsymbol{\mu \nu b b q q}'
    - category: τvbbqq
      label: '\boldsymbol{\tau \nu b b q q}'
    - category: vvbbbb
      label: '\boldsymbol{\nu \nu b b b b}'
    - category: bbqqqq
      label: bbqqqq
    - category: vvbb
      label: '\boldsymbol{\nu\nu} bb'
    - category: tatabb
      label: '\boldsymbol{\tau\tau} bb'
    - category: bbbb
      label: bbbb
    - category: qqbb
      label: qqbb
    - category: ttH
      label: ttH
    - category: ttZ
      label: ttZ
    - category: vvqqH
      label: vvqqH
    - category: vvHH
      label: vvHH
      is_signal: true
    - category: vvHHbbbb
      label: (vvbbbb)
      is_signal: true
  #ignore_categories: llbbbb

# general note about cuts:
# they appear in groups composed of at least one cut and are denoted in code by the
# parameter 'step'
# the first group is preselection (group/step=0). <counter> starts at 0 too
# every stage of MVA will add another group (1,2,3 etc.)
# future TODO: assig an ID to cuts as in cut.<group>.<counter>

# parameters:
# cuts.<group>.quantity: (name in data store/ROOT TTree), operator (see below),
#                             value or lower+upper, label (description to use in plots) 
# cuts.<group>.operator: any of gte (greater than or equal), lte (lower than or
#                             eqal), eq (equal) or within_bounds
# cuts.<group>.{value/lower/upper}: cut parameters
#
# all parameters (except of operator) are passed directly to the respective constructors
# of Less/GreaterThan/Equal/WithinBoundsCut cuts can be disabled by commenting out the
# line or adding disabled: true

cuts:
  preselection:
  - { quantity: nisoleptons, operator: eq, value: 0, label: 'Isolated leptons'}
  - { quantity: sumBTags, operator: gte, value: 1.8, label: '\Sigma_{bTags}'}
  - { quantity: fit4C_mh1, operator: within_bounds, lower: 60., upper: 180., label: 'm_{H1}^{4C}', unit: 'GeV', xlim_view: [0, 500] }
  - { quantity: fit4C_mh2, operator: within_bounds, lower: 40., upper: 250., label: 'm_{H2}^{4C}', unit: 'GeV', xlim_view: [0, 500] }
  - { quantity: thrust, operator: lte, value: 0.93, label: 'thrust' }
  - { quantity: evis, operator: lte, value: 510, label: 'E_{vis}', unit: 'GeV' }
  - { quantity: zhh_mhh, operator: gte, value: 200, label: 'M_{vis}', unit: 'GeV' }
  
  # the mva_cut is applied after training and inference of a MVA
  # the value to cut on can be either
  # 1. entered manually or
  # 2. the best found value can be fetched automatically from a
  #    TrainingAction implementing MVAThresholdFinderInterface
  #    for this, use the syntax: <mva_name>.threshold
  mva_cut:
  - { quantity: SigMVAOutput, operator: gte, value: default_mva.threshold }
  feature_nocut:
  - { quantity: bmax1, operator: gte, value: 0. }
  - { quantity: bmax2, operator: gte, value: 0. }
  - { quantity: bmax3, operator: gte, value: 0. }
  - { quantity: bmax4, operator: gte, value: 0. }
  - { quantity: jet1_m, operator: gte, value: 0. }
  - { quantity: jet2_m, operator: gte, value: 0. }
  - { quantity: jet3_m, operator: gte, value: 0. }
  - { quantity: jet4_m, operator: gte, value: 0. }
  - { quantity: zz_mz1, operator: gte, value: 0. }
  - { quantity: zz_mz2, operator: gte, value: 0. }
  - { quantity: massWtt4j, operator: gte, value: 0. }
  - { quantity: massW2tt5j, operator: gte, value: 0. }
  - { quantity: ZHH_FitChi2, operator: gte, value: 0. }
  - { quantity: fit4C_mh1, operator: gte, value: 0. }
  - { quantity: npfos, operator: gte, value: 0. }
  - { quantity: yplus, operator: gte, value: 0. }
  mva_zero_cut:
  - { quantity: SigMVAOutput, operator: lte, value: 0.00001 }
  mva_nocut:
  - { quantity: SigMVAOutput, operator: gte, value: 0. }
  eval_cut:
  - { quantity: bmax1, operator: gte, value: 0. }
  - { quantity: bmax2, operator: gte, value: 0. }
  - { quantity: bmax3, operator: gte, value: 0. }
  - { quantity: bmax4, operator: gte, value: 0. }
  - { quantity: jet1_m, operator: gte, value: 0. }
  - { quantity: jet2_m, operator: gte, value: 0. }
  - { quantity: jet3_m, operator: gte, value: 0. }
  - { quantity: jet4_m, operator: gte, value: 0. }
  - { quantity: zz_mz1, operator: gte, value: 0. }
  - { quantity: zz_mz2, operator: gte, value: 0. }
  - { quantity: massWtt4j, operator: gte, value: 0. }
  - { quantity: massW2tt5j, operator: gte, value: 0. }
  - { quantity: ZHH_FitChi2, operator: gte, value: 0. }
  - { quantity: fit4C_mh1, operator: gte, value: 0. }
  - { quantity: npfos, operator: gte, value: 0. }
  - { quantity: yplus, operator: gte, value: 0. }
  #second_mva_cut:
  #- { quantity: SecondMVAOutput, operator: gte, value: second_mva.threshold }

# MVAs are defined here
# training, inference and optimization (i.e. assignment which threshold value to use) are
# done by actions, which reference the MVA (see the actions section).
# 
#
# parameters:
# mvas.#.name: label/name to reference this MVA in action
# mvas.#.features: list of features (i.e. columns in a DataStore to use)
# mvas.#.classes: list of tuples()
# mvas.#.label_name: column to save the MVA output in
# mvas.#.data_file: file to store input data in
# mvas.#.mva_file: file to save the model to
#
mvas:
  - name: default_mva

    # model: either 'LGBMClassifier' or 'XGBClassifier' 
    model: XGBClassifier # LGBMClassifier
    
    features: [
      bmax1,
      bmax2,
      bmax3,
      bmax4,
      jet1_m,
      jet2_m,
      jet3_m,
      jet4_m,
      zz_mz1,
      zz_mz2,
      massWtt4j,
      massW2tt5j,
      ZHH_FitChi2,
      fit4C_mh1,
      npfos,
      yplus,
      ####
      #ZZH_FitChi2, ZHH_p1stBeforeFit,
      #ZZH_p1stBeforeFit, ZHH_cosThBeforeFit, ZZH_cosThBeforeFit,
      #massT1tt4j, massT2tt4j,
      #massW2tt5j, massT1tt5j, massT2tt5j,
      #zhh_mhh,
      #fit4C_mh2,
      #thrust, costhrust,
      #ptmiss,
      ]
    classes:
    # two-element arrays of structure (label, name of registered EventCategory)
    # see sources/.../event_categorization/items
    - [0, 'vvHHbbbb']
    - [1, 'vvHH_nonbbbb']
    - [2, 'vvqqH']
    - [3, 'vvbbbb']
    - [4, 'vvbb']
    - [5, 'lvbbqq']
    - [6, 'bbbb']
    - [7, 'bbqqqq']
    # note: the output is the sum for all signal categories given in steer['signal_categories'] 
    label_name: SigMVAOutput

    # file to store the training and testing data in for training this classifier
    data_file: $hypothesis_train_test.npz

    mva_file: $hypothesis_mva.pickle
  - name: splitsignal_mva
    features: [
      #bmax1, bmax2, bmax3, bmax4,
      #jet1_m, jet2_m, jet3_m, jet4_m,
      #zz_mz1, zz_mz2,
      #massWtt4j, massW2tt5j,
      #ZHH_FitChi2, fit4C_mh1,
      #npfos, yplus,
      ####
      ZZH_FitChi2, ZHH_p1stBeforeFit,
      ZZH_p1stBeforeFit, ZHH_cosThBeforeFit, ZZH_cosThBeforeFit,
      massT1tt4j, massT2tt4j,
      massW2tt5j, massT1tt5j, massT2tt5j,
      zhh_mhh,
      fit4C_mh2,
      thrust, costhrust,
      ptmiss,
      ]
    classes:
    # two-element arrays of structure (label, name of registered EventCategory)
    # see sources/.../event_categorization/items
    - [0, 'vvHHbbbb']
    - [1, 'vvqqH']
    - [2, 'vvbbbb']
    - [3, 'vvbb']
    - [4, 'lvbbqq']
    - [5, 'bbbb']
    - [6, 'bbqqqq']
    # note: the output is the sum for all signal categories given in steer['signal_categories'] 
    label_name: SplitSigMVAOutput

    # file to store the training and testing data in for training this classifier
    data_file: $hypothesis_splitsignal_train_test.npz

    mva_file: $hypothesis_splitsignal_mva.pickle

# define what should be done after the data is loaded
# for a documentation of supplied actions, see zhh/analysis/cutflow_processor_actions/README.md
actions:
  # optional:
  - type: ApplyCuts
    cuts: preselection
    step: 0 # step=0 is always preselection
    cache: '$hypothesis_cutflow_presel.pickle'
  
  # optional:
  # step_start: 0
  # step_end: 0
  - type: CreateCutflowPlots
    file: '$hypothesis_cutflow_preselection_plots.pdf'
    
  # optional:
  # step_start: 0
  # step_end: 0
  - type: CreateCutflowTable
    file: '$hypothesis_cutflow_preselection_table.pdf'

  # split in train/testing [accross all steps, i.e. regardless of cut group]
  # creates a new integer column 'split'; for n entries in fractions:
  # value 0 is assigned to a fraction of events specified as first entry in fractions
  # value 1[..]n-1 to fractions given at position 1 to n-1
  # value n is assigned to the remaining events [fraction (1 - sum(all previous values))]
  - type: SplitDatasets
    fractions: [ 0.75 ]
    disabled: false
    
  # writes out training/testing data
  # optional:
  # step: 0
  - type: WriteMVAData
    mva: default_mva
    disabled: false

  - type: PrintSplitWeights
    disabled: true
  
  # data_source: 'kinfit' or (TODO) 'flavortag' or 'hybrid'
  - type: AttachMatrixElements
    output_name: DsigZHH_ZZH
    data_source: kinfit
    disabled: True

  - type: SklearnMulticlassTraining
    hyperparams: {
      max_depth: 5,
      n_estimators: 10,
      learning_rate: 0.1
    }
    debug: true
    mva: default_mva
    split: 0
    disabled: false

  # optional:
  # clf_prop: clf
  # step: 0
  - type: SklearnMulticlassHyperparamTraining
    hyperparam_bounds: [
      { name: max_depth, type: int, lower: 3, upper: 7 },
      { name: n_estimators, type: int, lower: 250, upper: 750 },
      { name: learning_rate, type: float, lower: 0.01, upper: 0.6 }
    ]
    mva: default_mva
    split: 0
    ntrials: 500
    disabled: true

  # optional:
  # clf_prop: clf
  # step: 0
  - type: SklearnMulticlassInference
    mva: default_mva
    split: 1 # split 0 = train dataset; split 1 = test dataset
    disabled: false
  
  # The values to cut on can be evaluated lazily
  # i.e. the value does not need to be known when the program is started
  # This can be useful for cuts on MVA output, when the best value can
  # be fetched from training/validation. 
  - type: ApplyCuts
    cuts: mva_cut
    step: 1
    disabled: false


    root_files: /data/dust/user/jtorndal/zhh/AnalysisFinal/550-llhh-$CONF_SUFFIX/*.root
    event_categorization:
      default: null
      order: null
      items: [ llHH, eeHHbbbb, μμHHbbbb, ττHHbbbb, llHH_llbbbb, llHH_llnonbbbb, llqqH ]
    disabled: true
    reset: false
  
  - name: vvhh

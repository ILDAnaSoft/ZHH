# hypothesis: used as label in plots and for naming output files
# made available within the run of cutflow as environment variable '$hypothesis'
hypothesis: vvbbbb

signal_categories:
- EventCategories.v1v1HHbbbb
- EventCategories.v23v23HHbbbb
- EventCategories.vvHH_nonbbbb
- EventCategories.vvHHbbbb # includes v1v1HHbbbb and v23v23HHbbbb (needed for the MVA)

# used to calculate event weights and absolute event counts
# polarization of [ electronBeam, positronBeam ]
beam_polarization: [ -0.8, +0.3 ]

# unit: ab^-1
luminosity: 2.

# definition of event categories
# the registration of event categories to specific sources is done in the sources section
# info: while the naming can be arbitrary, a unique ID must be supplied which must exist 
#       in the EVENT_CATEGORIES_TRUE class, too. See EventCategories.py
event_categories:

# event categories are used for plotting/cutflow tables and assigned using MC truth information
# if you want a category with a given NAME to be plotted explicitly, set id to EventCategories.<NAME> and make
# sure you set handler to an existing function in FinalStateDefinitions which does the check 

# each event will be assigned an 'id' (event_category column) in the following order:
# 1  (deprecated) the TTree branch event_category is read; the value might be overwritten by 2. and 3. (if defined)
# 2. a default value can be used to overwrite for all events of a data source (see sources section below)
# 3. the value of the last matching registered (see event_categorization.items for each source, below) category is used, where
#    the order is given either explicitly (event_categorization.order) or the order of definition is used.
# plots use the id to uniquely identify categories, whereas cutflow tables can make use of the named categorization and thus
# use different categories/be more granular (the logic to make sure no double counting occurs happens in the background :))

